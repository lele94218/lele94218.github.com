baseURL = "https://blog.terryx.com/"
defaultContentLanguage = "zh-cn"
title = "欲說還休"
theme = "ink"
paginate = 10

[params]
  description = "TerryX's Blog"
  author = "TerryX"
  homeTitle = "欲說還休"
  homeSubtitle = "TerryX's Blog"
  homeBio = "CS, Algorithms, Java, Linux, and more."
  recentPostsCount = 5

  [[params.socialLinks]]
    name = "GitHub"
    url = "https://github.com/lele94218"
    external = true
  [[params.socialLinks]]
    name = "Blog"
    url = "/posts/"

[menu]
  [[menu.main]]
    name = "About"
    url = "/about/"
    weight = 1
  [[menu.main]]
    name = "Blog"
    url = "/posts/"
    weight = 2
  [[menu.main]]
    name = "Tags"
    url = "/tags/"
    weight = 3

[taxonomies]
  tag = "tags"
  category = "categories"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    codeFences = true
    lineNos = false
    noClasses = true
    style = "github"

[related]
  includeNewer = true
  threshold = 80
  toLower = true
  [[related.indices]]
    name = "tags"
    weight = 100
  [[related.indices]]
    name = "date"
    weight = 10

[outputs]
  home = ["HTML", "RSS"]
